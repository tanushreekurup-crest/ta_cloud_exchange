consumer_timeout = 2592000000
disk_free_limit.absolute = $(RABBITMQ_RAM_RESOURCES)MB
total_memory_available_override_value = $(RABBITMQ_RAM_RESOURCES)MB
vm_memory_high_watermark_paging_ratio = 0.60
vm_memory_high_watermark.relative = 0.80
cluster_partition_handling = pause_minority

# disables non-TLS listeners, only TLS-enabled clients will be able to connect
listeners.tcp = none

# add support for both tls versions
ssl_options.versions.1 = tlsv1.3
ssl_options.versions.2 = tlsv1.2

# TLS 1.3 Suites (Mandatory when overriding)
ssl_options.ciphers.1 = TLS_AES_256_GCM_SHA384
ssl_options.ciphers.2 = TLS_AES_128_GCM_SHA256
ssl_options.ciphers.3 = TLS_AES_128_CCM_SHA256
ssl_options.ciphers.4 = TLS_AES_128_CCM_8_SHA256

# Hardened TLS 1.2 Suits
ssl_options.ciphers.5 = ECDHE-ECDSA-AES128-GCM-SHA256
ssl_options.ciphers.6 = ECDHE-RSA-AES128-GCM-SHA256
ssl_options.ciphers.7 = ECDHE-ECDSA-AES256-GCM-SHA384
ssl_options.ciphers.8 = ECDHE-RSA-AES256-GCM-SHA384
ssl_options.ciphers.9 = ECDHE-ECDSA-CHACHA20-POLY1305
ssl_options.ciphers.10 = ECDHE-RSA-CHACHA20-POLY1305
ssl_options.honor_cipher_order = true
ssl_options.honor_ecc_order    = true

listeners.ssl.default = 5671
ssl_options.certfile = /etc/rabbitmq/conf.d/rabbitmq_cert.crt
ssl_options.keyfile = /etc/rabbitmq/conf.d/rabbitmq_cert_key.key
ssl_options.cacertfile = /etc/rabbitmq/conf.d/rabbitmq_cert_ca.crt
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

management.ssl.port = 15671
management.ssl.certfile = /etc/rabbitmq/conf.d/rabbitmq_cert.crt
management.ssl.keyfile = /etc/rabbitmq/conf.d/rabbitmq_cert_key.key
management.ssl.cacertfile = /etc/rabbitmq/conf.d/rabbitmq_cert_ca.crt
management.ssl.verify = verify_none
management.ssl.fail_if_no_peer_cert = false


# TLS 1.3 Suites (Mandatory when overriding)
management.ssl.ciphers.1 = TLS_AES_256_GCM_SHA384
management.ssl.ciphers.2 = TLS_AES_128_GCM_SHA256
management.ssl.ciphers.3 = TLS_AES_128_CCM_SHA256
management.ssl.ciphers.4 = TLS_AES_128_CCM_8_SHA256

# Hardened TLS 1.2 Suits
management.ssl.ciphers.5 = ECDHE-ECDSA-AES128-GCM-SHA256
management.ssl.ciphers.6 = ECDHE-RSA-AES128-GCM-SHA256
management.ssl.ciphers.7 = ECDHE-ECDSA-AES256-GCM-SHA384
management.ssl.ciphers.8 = ECDHE-RSA-AES256-GCM-SHA384
management.ssl.ciphers.9 = ECDHE-ECDSA-CHACHA20-POLY1305
management.ssl.ciphers.10 = ECDHE-RSA-CHACHA20-POLY1305
management.ssl.honor_cipher_order = true
management.ssl.honor_ecc_order    = true

# maximum message size in bytes
max_message_size = 134217728
